<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet Summarizer</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="sanctuary-layout">
      <section class="hero-panel">
        <h1 class="analyst-title">Internet Summarizer</h1>
      </section>

      <section class="surface-panel control-panel">
        <label class="field">
          <span class="field-label field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M5 19V8.5A2.5 2.5 0 0 1 7.5 6H19" />
                <path d="M9 6V4M13 6V4M8 11h8M8 15h5" />
              </svg>
            </span>
            Тема фокуса
          </span>
          <input id="focus-topic" class="input" type="text" placeholder="Например: алгоритмы" />
        </label>

        <div class="date-grid">
          <label class="field">
            <span class="field-label field-label-with-icon">
              <span class="icon-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="icon-svg">
                  <path d="M7 3v4M17 3v4M4 9h16M5.5 5h13A1.5 1.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11A1.5 1.5 0 0 1 5.5 5Z" />
                </svg>
              </span>
              Начало периода
            </span>
            <input id="start-date" class="input" type="datetime-local" />
          </label>
          <label class="field">
            <span class="field-label field-label-with-icon">
              <span class="icon-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="icon-svg">
                  <path d="M7 3v4M17 3v4M4 9h16M5.5 5h13A1.5 1.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11A1.5 1.5 0 0 1 5.5 5Z" />
                  <path d="m14 14 2 2 4-4" />
                </svg>
              </span>
              Конец периода
            </span>
            <input id="end-date" class="input" type="datetime-local" />
          </label>
        </div>

        <div class="action-row">
          <button id="generate-summary" class="primary-button" type="button">
            <span class="icon-badge icon-badge-button" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M12 3v18M3 12h18" />
              </svg>
            </span>
            Получить сводку
          </button>
          <button id="stop-summary" class="secondary-button destructive-button" type="button">
            <span class="icon-badge icon-badge-action" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M8 8h8v8H8z" />
              </svg>
            </span>
            Остановить
          </button>
          <button id="restart-summary" class="secondary-button" type="button">
            <span class="icon-badge icon-badge-action" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M17 2v5h-5" />
                <path d="M7 22v-5h5" />
                <path d="M20 11a8 8 0 0 0-13.7-5.7L12 7" />
                <path d="M4 13a8 8 0 0 0 13.7 5.7L12 17" />
              </svg>
            </span>
            Перезапустить
          </button>
        </div>
      </section>

      <section class="surface-panel status-panel">
        <div class="status-row">
          <span class="status-label field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M12 6v6l4 2" />
                <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" />
              </svg>
            </span>
            Статус
          </span>
          <span id="status" class="status-badge">Готов</span>
        </div>
        <div class="status-row">
          <span class="status-label field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 5 17.5z" />
                <path d="M8 9h8M8 12h8M8 15h6" />
              </svg>
            </span>
            Страниц в диапазоне
          </span>
          <span id="page-count" class="status-value">0</span>
        </div>
      </section>

      <section class="surface-panel sites-panel">
        <div class="panel-heading">
          <span class="panel-title field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18" />
                <circle cx="12" cy="12" r="9" />
              </svg>
            </span>
            Сайты за период
          </span>
          <button id="clear-pages" class="secondary-button destructive-button" type="button">
            <span class="icon-badge icon-badge-action" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M4 7h16M10 11v5M14 11v5M6 7l1 11a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-11" />
                <path d="M9 7V4h6v3" />
              </svg>
            </span>
            Очистить страницы
          </button>
        </div>
        <div id="sites-list" class="sites-list">
          <p class="empty-copy">Выберите даты, чтобы увидеть список посещённых сайтов.</p>
        </div>
      </section>

      <section class="surface-panel summary-panel">
        <div class="panel-heading">
          <span class="panel-title field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M6 7.5A2.5 2.5 0 0 1 8.5 5h7A2.5 2.5 0 0 1 18 7.5v9A2.5 2.5 0 0 1 15.5 19h-7A2.5 2.5 0 0 1 6 16.5z" />
                <path d="M9 9h6M9 12h6M9 15h4" />
              </svg>
            </span>
            Итоговая сводка
          </span>
          <button id="copy-summary" class="secondary-button" type="button">
            <span class="icon-badge icon-badge-action" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M9 9V5.5A1.5 1.5 0 0 1 10.5 4h8A1.5 1.5 0 0 1 20 5.5v8A1.5 1.5 0 0 1 18.5 15H15" />
                <path d="M5.5 9H13A1.5 1.5 0 0 1 14.5 10.5v8A1.5 1.5 0 0 1 13 20H5.5A1.5 1.5 0 0 1 4 18.5v-8A1.5 1.5 0 0 1 5.5 9Z" />
              </svg>
            </span>
            Скопировать
          </button>
        </div>
        <div id="summary" class="summary-output">Пока пусто.</div>
      </section>

      <section class="surface-panel history-panel">
        <div class="panel-heading">
          <span class="panel-title field-label-with-icon">
            <span class="icon-badge" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M12 8v5l3 2" />
                <path d="M4.5 12a7.5 7.5 0 1 0 2.2-5.3" />
                <path d="M4 4v5h5" />
              </svg>
            </span>
            История сводок
          </span>
          <button id="clear-history" class="secondary-button destructive-button" type="button">
            <span class="icon-badge icon-badge-action" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="icon-svg">
                <path d="M4 7h16M10 11v5M14 11v5M6 7l1 11a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-11" />
                <path d="M9 7V4h6v3" />
              </svg>
            </span>
            Очистить сводки
          </button>
        </div>
        <div id="history-list" class="history-list">
          <p class="empty-copy">История сводок пока пуста.</p>
        </div>
      </section>
    </main>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
